[[permission]]
identifier = "allow-kanban-commands"
description = "Allow all kanban local invoke commands"
commands.allow = [
  "list_boards",
  "create_board",
  "update_board",
  "delete_board",
  "get_board",
  "get_last_board_id",
  "set_last_board_id",
  "list_columns",
  "create_column",
  "update_column",
  "reorder_columns",
  "delete_column",
  "move_column_up",
  "move_column_down",
  "list_cards",
  "get_card",
  "create_card",
  "update_card",
  "move_card",
  "reorder_cards",
  "duplicate_card",
  "archive_card",
  "delete_card",
  "move_card_to_column",
  "list_tags",
  "create_tag",
  "set_card_tags",
  "list_checklist_items",
  "upsert_checklist_item",
  "delete_checklist_item",
  "reorder_checklist_items",
]
