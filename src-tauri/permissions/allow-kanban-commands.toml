[[permission]]
identifier = "allow-kanban-commands"
description = "Allow agile Meridian invoke commands"
commands.allow = [
  "list_projects",
  "get_project",
  "create_project",
  "update_project",
  "delete_project",
  "get_last_project_id",
  "set_last_project_id",
  "list_versions",
  "create_version",
  "update_version",
  "delete_version",
  "list_epics",
  "create_epic",
  "update_epic",
  "delete_epic",
  "list_sprints",
  "create_sprint",
  "update_sprint",
  "delete_sprint",
  "get_last_sprint_id",
  "set_last_sprint_id",
  "list_workflow_columns",
  "list_stories",
  "get_story",
  "create_story",
  "update_story",
  "delete_story",
  "set_story_acceptance",
  "set_story_dependencies",
  "move_story",
  "reorder_stories",
]
